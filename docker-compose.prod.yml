# Production compose (standalone): pull from Docker Hub images.
# HTTP only (port 80). No TLS termination in this compose.
#
# Usage:
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d

services:
  nginx:
    image: devfumaco/essex-nginx:essexV4
    container_name: essex-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      # Only mount uploads (public storage). Do NOT mount the whole app code.
      - storage_public:/var/www/html/public/storage:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:80/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  app:
    image: devfumaco/essex-app:essexV4
    container_name: essex-app
    restart: unless-stopped
    volumes:
      # Persist only public uploads; code comes from the image tag
      - storage_public:/var/www/html/storage/app/public
      - storage_logs:/var/www/html/storage/logs
    environment:
      - APP_ENV=production
      # HTTP only (no SSL in this compose)
      - HTTPS=false
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_CLIENT=phpredis
      - CACHE_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - SESSION_DRIVER=redis
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "/usr/local/bin/php-fpm-healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s

  redis:
    image: redis:7-alpine
    container_name: essex-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  storage_public:
    driver: local
  redis_data:
    driver: local
  storage_logs:
    driver: local

networks:
  app_network:
    driver: bridge

