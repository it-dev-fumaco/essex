# Production Docker Compose - Laravel (Nginx, PHP-FPM, Redis)
# Usage: docker compose up -d

services:
  nginx:
    build:
      context: docker/nginx
      dockerfile: Dockerfile
    image: essex-nginx:latest
    container_name: essex-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - app_volume:/var/www/html:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:80/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: essex-app:latest
    container_name: essex-app
    restart: unless-stopped
    volumes:
      - app_volume:/var/www/html
      - storage_logs:/var/www/html/storage/logs
    environment:
      - APP_ENV=production
      # Use HTTP - Docker setup has no SSL. HTTPS would cause ERR_CONNECTION_REFUSED on port 443.
      - APP_URL=http://essex.local
      - ASSET_URL=http://essex.local
      - HTTPS=false
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_CLIENT=phpredis
      - CACHE_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - SESSION_DRIVER=redis
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "/usr/local/bin/php-fpm-healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s

  redis:
    image: redis:7-alpine
    container_name: essex-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  app_volume:
    driver: local
  redis_data:
    driver: local
  storage_logs:
    driver: local

networks:
  app_network:
    driver: bridge
