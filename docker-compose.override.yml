services:
  app:
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
    volumes:
      # Dev: mount local code so changes reflect immediately
      - ./:/var/www/html
      - storage_logs:/var/www/html/storage/logs

  nginx:
    volumes:
      # Dev: nginx serves the mounted local code (read-only)
      - ./:/var/www/html:ro

