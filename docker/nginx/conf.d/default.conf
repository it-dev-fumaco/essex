upstream php-fpm {
    server app:9000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name essex.local 127.0.0.1 localhost;
    root /var/www/html/public;

    index index.php index.html;
    charset utf-8;

    # Security: hide nginx version
    server_tokens off;

    # Max body size (match PHP upload_max_filesize)
    client_max_body_size 64M;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Serve static assets directly; CORS for fonts when page loaded from localhost
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf|eot|map)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
        try_files $uri =404;
    }

    # Explicit storage path (Laravel public/storage -> storage/app/public)
    location /storage/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }

    # Laravel: forward all other requests to index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass php-fpm;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;

        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_connect_timeout 60s;
        fastcgi_send_timeout 300s;
        fastcgi_read_timeout 300s;
        fastcgi_busy_buffers_size 64k;
        fastcgi_temp_file_write_size 256k;

        fastcgi_param HTTP_PROXY "";
    }
}
